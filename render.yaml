databases:
  - name: custodia-db
    plan: free
    databaseName: custodia
    user: custodia_user

services:
  - type: web
    name: custodia-api
    runtime: python
    plan: free
    buildCommand: cd backend && chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn config.wsgi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: custodia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
